name: Update PSE generation per unit

on:
  workflow_dispatch:

  schedule:
    # GitHub Actions używa czasu UTC.
    # Ten układ daje uruchomienie co 45 minut:
    # 00:00, 00:45, 01:30, 02:15, 03:00, ...
    - cron: "0 0-23/3 * * *"
    - cron: "45 0-23/3 * * *"
    - cron: "30 1-23/3 * * *"
    - cron: "15 2-23/3 * * *"

permissions:
  contents: write

concurrency:
  group: pse-auto-update-generation
  cancel-in-progress: false

jobs:
  update-pse-generation:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run PSE auto update script
        run: |
          python pse_auto_update_generation.py

      - name: Commit updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add PSE_generation_per_unit_since_10_march.csv

          if [ -f PSE_generation_per_unit_failed.csv ]; then
            git add PSE_generation_per_unit_failed.csv
          fi

          if git diff --cached --quiet; then
            echo "No CSV changes to commit."
          else
            git commit -m "Update PSE generation per unit data"
            git push
          fi
